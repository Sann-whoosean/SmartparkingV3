<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <title>Login Sistem Parkir</title>

        <!-- Bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap"
            rel="stylesheet"
        />

        <style>
            * {
                font-family: "Plus Jakarta Sans", sans-serif;
            }

            body {
                min-height: 100vh;
                background: radial-gradient(
                    circle at top left,
                    #2563eb,
                    #020617
                );
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }

            .bg-shape {
                position: absolute;
                width: 420px;
                height: 420px;
                background: linear-gradient(135deg, #60a5fa, #2563eb);
                filter: blur(120px);
                opacity: 0.6;
                top: -120px;
                left: -120px;
            }

            .login-wrap {
                position: relative;
                display: grid;
                grid-template-columns: 1fr 1fr;
                width: 900px;
                max-width: 95%;
                border-radius: 22px;
                overflow: hidden;
                backdrop-filter: blur(20px);
                background: rgba(255, 255, 255, 0.08);
                box-shadow: 0 40px 80px rgba(0, 0, 0, 0.45);
            }

            .login-brand {
                padding: 60px;
                color: #fff;
                background: linear-gradient(
                    160deg,
                    rgba(37, 99, 235, 0.85),
                    rgba(2, 6, 23, 0.95)
                );
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .login-brand img {
                width: 56px;
                margin-bottom: 20px;
            }

            .login-brand h1 {
                font-weight: 800;
                font-size: 42px;
                line-height: 1.1;
            }

            .login-brand p {
                opacity: 0.8;
                font-size: 14px;
                margin-top: 16px;
            }

            .login-form {
                padding: 60px;
                background: rgba(255, 255, 255, 0.95);
            }

            .login-form h2 {
                font-weight: 800;
                font-size: 26px;
                margin-bottom: 8px;
            }

            .login-form span {
                font-size: 13px;
                color: #64748b;
            }

            /* form control */
            .form-control {
                border-radius: 12px;
                padding: 14px;
                font-size: 14px;
                border: 1.5px solid #e5e7eb;
            }

            .form-control:focus {
                border-color: #2563eb;
                box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
            }

            .btn-login {
                margin-top: 10px;
                width: 100%;
                padding: 14px;
                border-radius: 12px;
                background: linear-gradient(135deg, #2563eb, #1e40af);
                border: none;
                color: #fff;
                font-weight: 700;
                letter-spacing: 0.3px;
            }

            .btn-login:hover {
                opacity: 0.9;
            }

            .note {
                margin-top: 18px;
                font-size: 12px;
                text-align: center;
                color: #64748b;
            }

            @media (max-width: 768px) {
                .login-wrap {
                    grid-template-columns: 1fr;
                }

                .login-brand {
                    display: none;
                }
            }
        </style>
    </head>

    <body>
        <div class="bg-shape"></div>

        <div class="login-wrap">
            <div class="login-brand">
                <img
                    src="{{ url_for('static', filename='img/white_logo.png') }}"
                />
                <h1>Smart<br />Parking</h1>
                <p>
                    Sistem parkir cerdas berbasis IoT.<br />
                    Akses dibatasi. Semua aktivitas direkam.
                </p>
            </div>

            <div class="login-form">
                <h2>Masuk Sistem</h2>
                <span>Gunakan akun resmi</span>

                <!-- tampilkan pesan error dari Flask -->
                {% if msg %}
                <div class="alert alert-danger mt-3">{{ msg }}</div>
                {% endif %}

                <form
                    method="POST"
                    action="{{ url_for('auth.login') }}"
                    onsubmit="return validasiLogin()"
                >
                    <div class="mb-3">
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-control"
                            placeholder="Email"
                            required
                        />
                    </div>
                    <div class="mb-3">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-control"
                            placeholder="Password"
                            required
                        />
                    </div>
                    <button type="submit" class="btn btn-login">LOGIN</button>
                </form>

                <div class="note">SmartParking © Sistem Keamanan Area</div>
            </div>
        </div>

        <script>
            function validasiLogin() {
                const email = document.getElementById("email").value.trim();
                const password = document
                    .getElementById("password")
                    .value.trim();

                if (email === "" || password === "") {
                    alert("Email dan password wajib diisi");
                    return false;
                }

                if (password.length < 8) {
                    alert("Password minimal 8 karakter");
                    return false;
                }

                return true;
            }
        </script>
    </body>
</html>
